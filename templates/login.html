<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Login FrutiFantastico</title>

    <style>

        body{
            font-family: Arial;
            background: #e8f5e9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login{
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            box-shadow: 0px 0px 10px gray;
        }

        h1{
            text-align: center;
            color: green;
        }

        input{
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button{
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        p{
            color: red;
            text-align: center;
        }

    </style>

</head>

<body>

    <div class="login">

        <h1>FrutiFantastico</h1>

        <form method="POST">

            <input
                type="text"
                name="usuario"
                placeholder="Usuario"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Contraseña"
                required
            >

            <button type="submit">
                Iniciar Sesion
            </button>

        </form>

        <p>{{ mensaje }}</p>

    </div>

</body>
</html>
